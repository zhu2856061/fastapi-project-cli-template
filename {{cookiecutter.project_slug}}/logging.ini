# logging.ini
[loggers]
keys=root,src,uvicorn,uvicorn.error,uvicorn.access,sqlalchemy,httpx

[handlers]
keys=console,rotating_file

[formatters]
keys=simple,verbose

# ====================== Formatters ======================
[formatter_simple]
format=%(message)s   # structlog 会接管格式，保持简单即可

[formatter_verbose]
format=%(asctime)s | %(created)d | %(levelname)-8s | %(name)s:%(lineno)d | %(message)s
datefmt=%Y-%m-%d %H:%M:%S


# ====================== Handlers ======================
[handler_console]
class=StreamHandler
level=DEBUG
formatter=verbose
args=(sys.stdout,)


[handler_rotating_file]
class=logging.handlers.TimedRotatingFileHandler
level=INFO
formatter=verbose
args=('logs/app.log', 'midnight', 1, 30, 'utf-8')   # 每天切割，保留30天


# ====================== Loggers ======================
[logger_root]
level=INFO
handlers=console,rotating_file
propagate=0

[logger_src]
level=DEBUG
handlers=console,rotating_file
qualname=src
propagate=0

[logger_uvicorn]
level=INFO
handlers=console,rotating_file
qualname=uvicorn
propagate=0

[logger_uvicorn.error]
level=INFO
handlers=console,rotating_file
qualname=uvicorn.error
propagate=0

[logger_uvicorn.access]
level=INFO
handlers=console,rotating_file
qualname=uvicorn.access
propagate=0

[logger_sqlalchemy]
level=WARNING
handlers=console,rotating_file
qualname=sqlalchemy
propagate=0

[logger_httpx]
level=WARNING
handlers=console,rotating_file
qualname=httpx
propagate=0